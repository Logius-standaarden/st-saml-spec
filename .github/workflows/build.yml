name: Build and Check
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - develop
jobs:
  build-index:
    name: Build index.html
    uses: Logius-standaarden/Automatisering/.github/workflows/build.yml@pr-timvdlippe-meerdere-documenten
  build-index-dv:
    name: Build index-dv.html
    uses: Logius-standaarden/Automatisering/.github/workflows/build.yml@pr-timvdlippe-meerdere-documenten
    with:
      source_input_file_name: 'index_dv.html'
  build:
    needs: [ build-index, build-index-dv ]
    name: Update cache
    runs-on: ubuntu-22.04
    steps:
      - name: Restore cache for `index.html`
        uses: actions/cache/restore@v4
        id: cache_restore
        with:
          path: ~/static
          key: ${{ github.run_id }}
      - name: Restore cache for `index_dv.html`
        uses: actions/cache/restore@v4
        with:
          path: ~/static
          key: ${{ github.run_id }}-index_dv.html
      # Delete the old cache on hit to emulate a cache update. See
      # https://github.com/actions/cache/issues/342.
      - name: Delete old cache
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh cache delete --repo ${{ github.repository }} ${{ steps.cache_restore.outputs.cache-primary-key }}
      - name: Save cache for both
        uses: actions/cache/save@v4
        with:
          path: ~/static
          key: ${{ github.run_id }}

  check:
    needs: build
    name: Check
    uses: Logius-standaarden/Automatisering/.github/workflows/check.yml@pr-timvdlippe-meerdere-documenten
  publish:
    needs: build
    name: Publish (Logius)
    uses: Logius-standaarden/Automatisering/.github/workflows/publish.yml@pr-timvdlippe-meerdere-documenten
    secrets: inherit
